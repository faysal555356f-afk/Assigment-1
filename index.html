
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Dashboard -->
  <div class="dashboard">
    <h1>Job Dashboard</h1>
    <div class="stats">
      <div>Total: <span id="totalCount">0</span></div>
      <div>Interview: <span id="interviewCount">0</span></div>
      <div>Rejected: <span id="rejectedCount">0</span></div>
    </div>
  </div>

  <!-- Section -->
  <div class="section-header">
    <h2>Available Jobs</h2>
    <span id="tabCount">0</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="interview">Interview</button>
    <button class="tab" data-tab="rejected">Rejected</button>
  </div>

  <!-- Cards -->
  <div id="jobContainer" class="jobs"></div>

</div>

<script src="script.js"></script>
</body>
</html>
